[pytest]
# pytest 配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=dong
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    skip_ci: 跳过 CI 运行的测试

# 覆盖率配置
[coverage:run]
source = src/dong
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
omit =
    */testing/fixtures.py  # fixtures 主要是 pytest 装饰器，难以通过常规测试覆盖

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
