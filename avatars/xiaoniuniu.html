<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小牛牛头像</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
    }
    
    .container {
      width: 512px;
      height: 512px;
      background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 10px 40px rgba(76, 175, 80, 0.3);
    }
    
    /* 牛脸 */
    .face {
      width: 280px;
      height: 240px;
      background: linear-gradient(180deg, #FAFAFA 0%, #F5F5F5 100%);
      border-radius: 50% 50% 45% 45%;
      position: absolute;
      top: 120px;
      left: 116px;
    }
    
    /* 左耳 */
    .ear-left {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #FAFAFA 0%, #EEEEEE 100%);
      border-radius: 50%;
      position: absolute;
      top: 130px;
      left: 80px;
    }
    
    .ear-left-inner {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #FFCDD2 0%, #EF9A9A 100%);
      border-radius: 50%;
      position: absolute;
      top: 142px;
      left: 92px;
    }
    
    /* 右耳 */
    .ear-right {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #FAFAFA 0%, #EEEEEE 100%);
      border-radius: 50%;
      position: absolute;
      top: 130px;
      right: 80px;
    }
    
    .ear-right-inner {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #FFCDD2 0%, #EF9A9A 100%);
      border-radius: 50%;
      position: absolute;
      top: 142px;
      right: 92px;
    }
    
    /* 左角 */
    .horn-left {
      width: 30px;
      height: 60px;
      background: linear-gradient(180deg, #FFD54F 0%, #FFC107 100%);
      border-radius: 15px 15px 5px 5px;
      position: absolute;
      top: 90px;
      left: 130px;
      transform: rotate(-15deg);
    }
    
    /* 右角 */
    .horn-right {
      width: 30px;
      height: 60px;
      background: linear-gradient(180deg, #FFD54F 0%, #FFC107 100%);
      border-radius: 15px 15px 5px 5px;
      position: absolute;
      top: 90px;
      right: 130px;
      transform: rotate(15deg);
    }
    
    /* 眼镜框 */
    .glasses {
      position: absolute;
      top: 180px;
      left: 156px;
    }
    
    .lens {
      width: 70px;
      height: 60px;
      background: rgba(200, 230, 255, 0.3);
      border: 5px solid #37474F;
      border-radius: 10px;
      position: absolute;
    }
    
    .lens-left {
      left: 0;
    }
    
    .lens-right {
      left: 90px;
    }
    
    .bridge {
      width: 25px;
      height: 5px;
      background: #37474F;
      position: absolute;
      top: 28px;
      left: 68px;
    }
    
    /* 镜片反光 */
    .glare {
      width: 20px;
      height: 10px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      position: absolute;
      top: 8px;
    }
    
    .glare-left {
      left: 10px;
    }
    
    .glare-right {
      left: 100px;
    }
    
    /* 鼻子 */
    .nose {
      width: 100px;
      height: 60px;
      background: linear-gradient(180deg, #FFAB91 0%, #FF8A65 100%);
      border-radius: 50%;
      position: absolute;
      top: 270px;
      left: 206px;
    }
    
    /* 鼻孔 */
    .nostril {
      width: 12px;
      height: 16px;
      background: #BF360C;
      border-radius: 50%;
      position: absolute;
      top: 285px;
    }
    
    .nostril-left {
      left: 230px;
    }
    
    .nostril-right {
      left: 270px;
    }
    
    /* 嘴巴 - 微笑 */
    .mouth {
      width: 60px;
      height: 25px;
      border: 4px solid #8D6E63;
      border-top: none;
      border-radius: 0 0 30px 30px;
      position: absolute;
      bottom: 140px;
      left: 226px;
      background: transparent;
    }
    
    /* 腮红 */
    .blush-left {
      width: 35px;
      height: 20px;
      background: rgba(255, 138, 128, 0.4);
      border-radius: 50%;
      position: absolute;
      top: 260px;
      left: 135px;
    }
    
    .blush-right {
      width: 35px;
      height: 20px;
      background: rgba(255, 138, 128, 0.4);
      border-radius: 50%;
      position: absolute;
      top: 260px;
      right: 135px;
    }
    
    /* 代码符号装饰 */
    .code-symbol {
      position: absolute;
      font-family: monospace;
      font-weight: bold;
      color: rgba(76, 175, 80, 0.4);
      font-size: 24px;
    }
    
    .code-1 {
      top: 60px;
      left: 80px;
    }
    
    .code-2 {
      top: 80px;
      right: 90px;
      font-size: 20px;
    }
    
    .code-3 {
      bottom: 80px;
      left: 100px;
      font-size: 22px;
    }
    
    .code-4 {
      bottom: 100px;
      right: 80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 代码符号装饰 -->
    <div class="code-symbol code-1">&lt;/&gt;</div>
    <div class="code-symbol code-2">{}</div>
    <div class="code-symbol code-3">//</div>
    <div class="code-symbol code-4">()</div>
    
    <!-- 耳朵 -->
    <div class="ear-left"></div>
    <div class="ear-left-inner"></div>
    <div class="ear-right"></div>
    <div class="ear-right-inner"></div>
    
    <!-- 角 -->
    <div class="horn-left"></div>
    <div class="horn-right"></div>
    
    <!-- 脸 -->
    <div class="face"></div>
    
    <!-- 眼镜 -->
    <div class="glasses">
      <div class="lens lens-left"></div>
      <div class="lens lens-right"></div>
      <div class="bridge"></div>
      <div class="glare glare-left"></div>
      <div class="glare glare-right"></div>
    </div>
    
    <!-- 腮红 -->
    <div class="blush-left"></div>
    <div class="blush-right"></div>
    
    <!-- 鼻子 -->
    <div class="nose"></div>
    <div class="nostril nostril-left"></div>
    <div class="nostril nostril-right"></div>
    
    <!-- 嘴巴 -->
    <div class="mouth"></div>
  </div>
</body>
</html>
